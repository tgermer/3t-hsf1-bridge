name: Feature
description: Plan a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
    - type: textarea
      id: goal
      attributes:
          label: Goal
          description: What should be achieved?
          placeholder: Describe the desired result.
      validations:
          required: true

    - type: textarea
      id: details
      attributes:
          label: Details
          description: Notes, context, constraints or ideas.
      validations:
          required: false

    - type: textarea
      id: acceptance
      attributes:
          label: Acceptance Criteria
          description: When is this done?
          placeholder: |
              - ...
              - ...
              - ...
      validations:
          required: false

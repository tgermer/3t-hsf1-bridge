name: Bug
description: Report something that is not working
title: "[Bug] "
labels: ["bug"]
body:
    - type: textarea
      id: problem
      attributes:
          label: Problem
          description: What is not working?
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Steps to reproduce
          placeholder: |
              1. ...
              2. ...
              3. ...
      validations:
          required: false

    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
      validations:
          required: false

    - type: textarea
      id: logs
      attributes:
          label: Logs or screenshots
          description: Add serial logs, screenshots or photos if useful.
          render: text
      validations:
          required: false
